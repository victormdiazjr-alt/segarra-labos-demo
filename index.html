<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LabOS &mdash; Segarra Engineering</title>
<meta property="og:type" content="website"/>
<meta property="og:title" content="LabOS — Test Right. Build Right."/>
<meta property="og:description" content="Segarra Engineering's concrete lab operating system — ASTM C39 auto-reports, mix design (ACI 211/305), concrete maturity, and ACI 318/214 acceptance analytics."/>
<meta property="og:url" content="https://victormdiazjr-alt.github.io/segarra-labos-demo/"/>
<meta property="og:image" content="https://victormdiazjr-alt.github.io/segarra-labos-demo/og-image.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="LabOS — Test Right. Build Right."/>
<meta name="twitter:image" content="https://victormdiazjr-alt.github.io/segarra-labos-demo/og-image.png"/>
<meta name="theme-color" content="#2b3bb0"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>

:root{
  --r1:#102090;--r2:#203090;--deep:#001080;--light:#3040a0;--navy:#2b2f8f;
  --gold:#c9a24a;--gray:#6d6e71;
  --ink:#151c3e;--sub:#4c5688;--dim:#767fa6;
  --glass:rgba(255,255,255,.55);--glass2:rgba(255,255,255,.78);
  --surface:rgba(255,255,255,.84);--surface2:rgba(255,255,255,.58);
  --line:rgba(28,40,110,.10);--line2:rgba(28,40,110,.20);--hair:rgba(28,40,110,.07);
  --accent:#3a4fd6;--accent2:#2540c0;
  --sh-sm:0 1px 2px rgba(28,40,90,.05),0 2px 8px rgba(28,40,90,.06);
  --sh-md:0 2px 6px rgba(28,40,90,.06),0 12px 28px rgba(28,40,90,.10);
  --sh-lg:0 4px 12px rgba(28,40,90,.08),0 22px 50px rgba(28,40,90,.15);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
  background:radial-gradient(1000px 700px at 12% -5%,rgba(110,132,255,.13),transparent 60%),
    radial-gradient(900px 700px at 104% 8%,rgba(150,130,255,.10),transparent 55%),
    linear-gradient(180deg,#f3f5fd 0%,#e6eaf7 100%);
  background-attachment:fixed;
}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(1200px 800px at 50% -20%,rgba(120,150,255,.06),transparent 60%);}
a{color:inherit;text-decoration:none}
::selection{background:rgba(80,110,255,.22)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(28,40,110,.20);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:rgba(28,40,110,.32)}
::-webkit-scrollbar-track{background:transparent}

.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh;position:relative;z-index:1}

/* ---------- Sidebar ---------- */
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 13px 22px;
  background:rgba(255,255,255,.68);
  backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);
  border-right:1px solid var(--line);display:flex;flex-direction:column;gap:3px;z-index:20;
  box-shadow:1px 0 0 rgba(255,255,255,.5),4px 0 24px rgba(28,40,90,.05)}
.logoPlate{background:none;border:none;box-shadow:none;border-radius:0;padding:6px 10px 12px;margin-bottom:4px}
.logoPlate img{width:100%;height:auto;display:block}
.sideCap{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);
  font-weight:700;margin:12px 8px 4px}
.navItem{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;cursor:pointer;
  color:var(--sub);font-weight:600;font-size:13.5px;transition:background .16s ease,color .16s ease;border:1px solid transparent;position:relative}
.navItem:hover{background:rgba(58,80,220,.09);color:var(--ink)}
.navItem.active{background:linear-gradient(120deg,rgba(48,64,200,.17),rgba(48,64,200,.07));
  color:#1c2a8c;border-color:rgba(48,64,200,.20);box-shadow:0 5px 16px rgba(40,60,180,.15),inset 0 1px 0 rgba(255,255,255,.7)}
.navItem.active::after{content:"";position:absolute;left:-13px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,#4a5fe6,#2b3bb0)}
.navItem.qgold.active::after{background:linear-gradient(180deg,#d8b25e,#a8863a)}
.navItem svg{width:19px;height:19px;flex:none;stroke-width:1.75}
.navItem .nb{margin-left:auto;background:rgba(58,80,220,.14);color:#2540c0;font-size:11px;font-weight:800;
  min-width:20px;height:20px;padding:0 6px;border-radius:20px;display:flex;align-items:center;justify-content:center}
.navItem .nb.warn{background:rgba(192,57,43,.15);color:#b03325}
.navItem .nb.gold{background:rgba(201,162,74,.22);color:#8a6a1e}
.sideFoot{margin-top:auto;font-size:10.5px;color:var(--dim);padding:10px 8px 0;line-height:1.5}
.gap{flex:1}

/* ---------- Main ---------- */
.mainWrap{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:15;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 26px;background:rgba(255,255,255,.8);
  backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border-bottom:1px solid var(--line)}
.hamb{display:none;background:var(--glass2);border:1px solid var(--line2);color:var(--ink);width:38px;height:38px;
  border-radius:11px;font-size:18px;cursor:pointer}
.pageTitle{display:flex;flex-direction:column;line-height:1.15}
.pageTitle b{font-size:19px;font-weight:800;letter-spacing:-.3px}
.pageTitle .tag{font-size:11.5px;color:#8a6a1e;font-weight:700;letter-spacing:.2px}
.topSpace{flex:1}
.syncChip{display:flex;align-items:center;gap:9px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 4px 14px rgba(30,40,90,.10),inset 0 1px 0 rgba(255,255,255,.9);
  padding:7px 12px;border-radius:12px;font-size:12px;color:var(--sub);font-weight:600}
.syncDot{width:8px;height:8px;border-radius:50%;background:#e0a020;box-shadow:0 0 0 4px rgba(224,160,32,.16)}
.syncChip.ok .syncDot{background:#1f8a4c;box-shadow:0 0 0 4px rgba(31,138,76,.16)}
.syncChip button{background:linear-gradient(180deg,#3a4fd6,#2b3bb0);border:1px solid rgba(255,255,255,.35);color:#fff;font-weight:700;
  padding:4px 10px;border-radius:9px;cursor:pointer;font-size:11.5px;font-family:inherit;box-shadow:0 2px 8px rgba(30,45,160,.22),inset 0 1px 0 rgba(255,255,255,.35)}
.syncChip button:hover{filter:brightness(1.08)}
.kbd{border:1px solid var(--line2);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:11px;
  color:var(--sub);font-weight:700;background:rgba(255,255,255,.7)}
.cmdBtn{display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 4px 14px rgba(30,40,90,.10),inset 0 1px 0 rgba(255,255,255,.9);
  padding:7px 11px;border-radius:11px;font-size:12.5px;color:var(--sub);cursor:pointer;font-weight:600}
.cmdBtn:hover{color:var(--ink);box-shadow:0 6px 18px rgba(30,40,90,.14),inset 0 1px 0 rgba(255,255,255,.9)}

.main{padding:26px 28px 64px;min-height:0}
.viewHead{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.viewHead h1{margin:0;font-size:25px;font-weight:800;letter-spacing:-.6px;color:#131a54;line-height:1.1}
.viewHead p{margin:5px 0 0;color:#4a5289;font-size:13px;line-height:1.4}

.btn{background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.66));border:1px solid var(--line2);color:var(--ink);padding:8px 14px;border-radius:11px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:var(--sh-sm),inset 0 1px 0 #fff;
  font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;transition:transform .14s,box-shadow .14s,filter .14s,background .14s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(30,40,90,.15),inset 0 1px 0 #fff;filter:brightness(1.01)}
.btn:active{transform:translateY(0);box-shadow:var(--sh-sm),inset 0 1px 0 #fff}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(58,80,220,.30),var(--sh-sm)}
.btn.primary{background:linear-gradient(180deg,#4a5fe6,#2b3bb0);border-color:rgba(255,255,255,.35);color:#fff;box-shadow:0 5px 16px rgba(30,45,160,.30),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.primary:hover{background:linear-gradient(180deg,#5a6ff6,#3242c0);box-shadow:0 8px 22px rgba(30,45,160,.34),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.ok{background:linear-gradient(180deg,#2bb069,#158048);border-color:rgba(255,255,255,.4);color:#fff;box-shadow:0 6px 18px rgba(20,120,70,.28),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.ok:hover{filter:brightness(1.08)}
.btn.gold{background:linear-gradient(180deg,#d8b25e,#a8863a);border-color:rgba(255,255,255,.45);color:#2a2005;box-shadow:0 6px 18px rgba(150,120,40,.28),inset 0 1px 0 rgba(255,255,255,.55)}
.btn.ghost{background:rgba(255,255,255,.45);border-color:var(--line2);color:var(--sub);box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.btn.ghost:hover{color:var(--ink);background:rgba(255,255,255,.7)}
.btn.sm{padding:6px 11px;font-size:11.5px;border-radius:9px}
.btn.danger{background:linear-gradient(180deg,#d85e4d,#a23b2f);border-color:rgba(255,255,255,.4);color:#fff;box-shadow:0 6px 18px rgba(160,50,40,.28),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.iconbtn{padding:0;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;flex:none}

/* ---------- Cards / glass ---------- */
.glass{background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(255,255,255,.60));border:1px solid rgba(255,255,255,.85);border-radius:18px;
  box-shadow:var(--sh-md),inset 0 1px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(255,255,255,.28);
  backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%)}
.pad{padding:18px 20px}
.grid{display:grid;gap:16px}
.cardTitle{font-size:12px;font-weight:800;letter-spacing:.55px;text-transform:uppercase;color:var(--sub);
  margin:0 0 14px;display:flex;align-items:center;gap:9px}
.cardTitle .cnt{background:rgba(58,80,220,.10);border:1px solid rgba(58,80,220,.18);border-radius:8px;padding:1px 8px;font-size:11px;color:#2540c0;font-weight:700}
.cardTitle .mr{margin-left:auto;font-weight:600;text-transform:none;letter-spacing:0}

/* KPI tiles */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile{background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(255,255,255,.58));border:1px solid rgba(255,255,255,.85);border-radius:15px;padding:15px 16px;position:relative;overflow:hidden;
  box-shadow:var(--sh-sm),inset 0 1px 0 rgba(255,255,255,.92),inset 0 -1px 0 rgba(255,255,255,.28);
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);transition:transform .16s,box-shadow .16s,border-color .16s;cursor:default}
.tile:hover{transform:translateY(-2px);border-color:#fff;box-shadow:var(--sh-md),inset 0 1px 0 rgba(255,255,255,.92)}
.tile.clk{cursor:pointer}
.tile.clk:active{transform:translateY(0)}
.tile.clk:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(58,80,220,.32),var(--sh-md)}
.tile .tl{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:7px;text-transform:uppercase}
.tile .tv{font-size:28px;font-weight:800;letter-spacing:-1px;margin-top:9px;line-height:1;color:var(--ink)}
.tile .ts{font-size:11.5px;color:var(--dim);margin-top:5px;font-weight:600}
.tile .spark{position:absolute;right:-4px;bottom:-4px;width:64px;height:44px;opacity:.5}
.tile.red .tv{color:#c0392b}.tile.amber .tv{color:#b7791f}.tile.green .tv{color:#1f8a4c}.tile.blue .tv{color:#2540c0}
.tile.red::before,.tile.amber::before,.tile.green::before,.tile.blue::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px}
.tile.red::before{background:#c0392b}.tile.amber::before{background:#b7791f}.tile.green::before{background:#1f8a4c}.tile.blue::before{background:#2540c0}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--dim);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;
  padding:9px 12px;border-bottom:1.5px solid var(--line2)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--hair);vertical-align:middle}
.tbl tbody tr:nth-child(even) td{background:rgba(28,40,110,.022)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .13s}
.tbl tbody tr.click{cursor:pointer}
.tbl tbody tr:hover td{background:rgba(58,80,220,.055)}
.tbl tbody tr.click:hover td{background:rgba(58,80,220,.08)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tbl b{font-weight:700}
.muted{color:var(--dim)}
.mono{font-variant-numeric:tabular-nums}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.3px;white-space:nowrap;text-transform:capitalize;border:1px solid transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.85}
.pill.green{background:rgba(31,138,76,.13);color:#187a44;border-color:rgba(31,138,76,.22)}
.pill.amber{background:rgba(183,121,31,.15);color:#966210;border-color:rgba(183,121,31,.26)}
.pill.red{background:rgba(192,57,43,.12);color:#af3123;border-color:rgba(192,57,43,.24)}
.pill.blue{background:rgba(37,64,192,.12);color:#2540c0;border-color:rgba(37,64,192,.22)}
.pill.gray{background:rgba(80,90,130,.11);color:#495380;border-color:rgba(80,90,130,.2)}
.pill.gold{background:rgba(201,162,74,.17);color:#87681d;border-color:rgba(201,162,74,.34)}

.seed{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:800;color:#8a6a1e;
  background:rgba(201,162,74,.16);border:1px solid rgba(201,162,74,.4);padding:1px 6px;border-radius:6px;letter-spacing:.4px;vertical-align:middle}

.flag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:2px 8px;border-radius:7px}
.flag.red{background:rgba(192,57,43,.14);color:#b03325}
.flag.amber{background:rgba(183,121,31,.16);color:#9a6410}

/* Column board */
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.col{background:rgba(255,255,255,.4);border:1px solid var(--line);border-radius:16px;padding:14px;min-height:120px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.colHead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:12px}
.colHead .dot{width:9px;height:9px;border-radius:50%}
.colHead .cc{margin-left:auto;background:rgba(58,80,220,.10);border-radius:7px;padding:0 8px;font-size:11px;color:#2540c0;font-weight:700}
.rec{background:linear-gradient(180deg,rgba(255,255,255,.8),rgba(255,255,255,.5));border:1px solid rgba(255,255,255,.75);border-radius:12px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:all .16s;box-shadow:0 3px 12px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9)}
.rec:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.95);box-shadow:0 8px 20px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.rec .rt{font-weight:700;font-size:13px}
.rec .rs{font-size:11.5px;color:var(--dim);margin-top:3px}
.rec .rrow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
/* --- report thumbnail preview --- */
.thumb{position:relative;width:160px;height:212px;overflow:hidden;background:#fff;border:1px solid var(--line2);border-radius:9px;box-shadow:0 6px 18px rgba(30,40,90,.16);cursor:pointer;margin:0 0 11px;transition:transform .16s ease, box-shadow .16s ease}
.thumb:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(30,40,90,.24)}
.thumbInner{width:816px;transform:scale(.196);transform-origin:top left;pointer-events:none;-webkit-user-select:none;user-select:none}
.thumbOverlay{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:.4px;color:#fff;background:linear-gradient(to top,rgba(14,20,64,.9),rgba(14,20,64,0));padding:16px 0 6px;opacity:.92;transition:opacity .16s}
.thumb:hover .thumbOverlay{opacity:1}
.thumbOverlay .mag{font-size:12px}
.declNote{font-size:11px;color:#b03325;background:rgba(192,57,43,.10);border:1px solid rgba(192,57,43,.28);border-radius:8px;padding:6px 9px;margin-top:8px;line-height:1.4}
.declNote b{color:#932a1f}
/* --- decline reason panel (in report modal) --- */
.declinePanel{display:none;align-items:center;flex-wrap:wrap;gap:10px;padding:11px 16px;background:rgba(252,232,230,.96);border-bottom:1px solid rgba(192,57,43,.3)}
.declinePanel.open{display:flex}
.declinePanel label{font-size:12px;font-weight:700;color:#932a1f}
.declineInput{flex:1;min-width:220px;background:rgba(255,255,255,.85);border:1px solid rgba(192,57,43,.35);color:#3a1512;padding:8px 12px;border-radius:9px;font-size:12.5px;font-family:inherit}
.declineInput::placeholder{color:rgba(147,42,31,.55)}
.declBanner{background:rgba(252,232,230,.95);color:#932a1f;font-size:12px;padding:9px 16px;border-bottom:1px solid rgba(192,57,43,.3)}
.declBanner b{color:#b03325}

.lrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);margin-bottom:10px;transition:all .16s;cursor:pointer;box-shadow:0 4px 14px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9)}
.lrow:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.95);box-shadow:0 8px 20px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.lrow .li{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;font-size:17px;background:rgba(58,80,220,.10);border:1px solid rgba(58,80,220,.16)}
.lrow .lb{flex:1;min-width:0}
.lrow .lb .t{font-weight:700;font-size:13.5px}
.lrow .lb .s{font-size:11.5px;color:var(--dim);margin-top:2px}
.lrow .la{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}

.stat{display:flex;flex-direction:column;gap:2px}
.stat .sv{font-size:24px;font-weight:800;letter-spacing:-.5px}
.stat .sl{font-size:11px;color:var(--sub);font-weight:600}

.metaGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.mfield{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.mfield .k{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.mfield .v{font-size:14px;font-weight:700;margin-top:4px}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.subtabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.subtab{padding:8px 15px;border-radius:11px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);cursor:pointer;
  box-shadow:0 3px 10px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9);
  font-weight:700;font-size:12.5px;color:var(--sub);transition:all .16s;display:flex;align-items:center;gap:8px}
.subtab:hover{color:var(--ink);box-shadow:0 5px 14px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.subtab.active{background:linear-gradient(120deg,rgba(48,64,200,.16),rgba(48,64,200,.08));color:#1c2a8c;border-color:rgba(48,64,200,.22)}
.subtab .sc{background:rgba(58,80,220,.14);color:#2540c0;border-radius:7px;padding:0 7px;font-size:11px}

.omnantBar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:13px 18px;border-radius:15px;margin-bottom:18px;
  background:linear-gradient(120deg,rgba(201,162,74,.12),rgba(58,80,220,.10));border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.omnantBar .oi{width:40px;height:40px;border-radius:11px;background:rgba(201,162,74,.20);border:1px solid rgba(201,162,74,.4);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.omnantBar .ot{font-weight:800;font-size:13.5px}
.omnantBar .os{font-size:11.5px;color:var(--sub);margin-top:2px}

.empty{padding:26px;text-align:center;color:var(--dim);font-size:12.5px}

/* Forms */
.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form label{display:flex;flex-direction:column;font-size:11.5px;color:var(--sub);font-weight:700;gap:6px;min-width:0}
.form input,.form select,.form textarea{padding:10px 12px;border-radius:11px;border:1px solid var(--line2);
  background:rgba(255,255,255,.72);color:var(--ink);font-size:13px;font-family:inherit;width:100%;min-width:0;max-width:100%;transition:border-color .14s,box-shadow .14s,background .14s}
.form input:focus,.form select:focus,.form textarea:focus{outline:none;border-color:rgba(58,80,220,.6);background:#fff;box-shadow:0 0 0 3px rgba(58,80,220,.16)}
.form .full{grid-column:1/3}
.form option{background:#fff;color:var(--ink)}

/* ---------- Drawer ---------- */
.drawerBack{position:fixed;inset:0;background:rgba(20,28,60,.28);backdrop-filter:blur(3px);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s}
.drawerBack.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,94vw);z-index:41;transform:translateX(102%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;
  background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(255,255,255,.74));backdrop-filter:blur(26px) saturate(140%);-webkit-backdrop-filter:blur(26px) saturate(140%);
  border-left:1px solid rgba(255,255,255,.7);box-shadow:-30px 0 80px rgba(30,40,90,.18)}
.drawer.open{transform:translateX(0)}
.drawerHead{position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:18px 22px;
  border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;z-index:2}
.drawerHead h2{margin:0;font-size:18px;font-weight:800}
.drawerHead .sub{font-size:12px;color:var(--sub);margin-top:3px}
.drawerHead .x{margin-left:auto;background:var(--glass2);border:1px solid var(--line2);color:var(--ink);width:34px;height:34px;
  border-radius:10px;cursor:pointer;font-size:16px;flex:none}
.drawerBody{padding:20px 22px 40px}
.dsect{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);margin:20px 0 10px}
.dsect:first-child{margin-top:0}

/* ---------- Command palette ---------- */
.cmdBack{position:fixed;inset:0;background:rgba(20,28,60,.3);backdrop-filter:blur(5px);z-index:70;display:none;padding-top:12vh}
.cmdBack.open{display:block}
.cmdBox{max-width:600px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(255,255,255,.78));
  backdrop-filter:blur(26px) saturate(140%);-webkit-backdrop-filter:blur(26px) saturate(140%);
  border:1px solid rgba(255,255,255,.7);border-radius:18px;overflow:hidden;box-shadow:0 40px 100px rgba(30,40,90,.28),inset 0 1px 0 rgba(255,255,255,.9)}
.cmdBox input{width:100%;border:none;background:transparent;color:var(--ink);font-size:16px;padding:18px 20px;font-family:inherit;
  border-bottom:1px solid var(--line);outline:none}
.cmdBox input::placeholder{color:var(--dim)}
.cmdList{max-height:52vh;overflow-y:auto;padding:8px}
.cmdRow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;cursor:pointer;font-size:13.5px}
.cmdRow.sel,.cmdRow:hover{background:rgba(58,80,220,.10)}
.cmdRow .ci{width:26px;height:26px;border-radius:8px;background:rgba(58,80,220,.10);border:1px solid rgba(58,80,220,.16);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.cmdRow .cg{margin-left:auto;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700}

/* ---------- Modal (report) ---------- */
.modalBack{position:fixed;inset:0;background:rgba(20,28,60,.4);backdrop-filter:blur(4px);z-index:60;display:none;overflow:auto;padding:26px 14px}
.modalBack.open{display:block}
.modalCard{max-width:900px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 30px 90px rgba(30,40,90,.3)}
.modalBar{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;padding:11px 16px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border-bottom:1px solid var(--line2)}
.modalBar .mbL{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.modalBar .t{font-weight:800;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.modalBar .mbR{display:flex;align-items:center;gap:8px;flex:none}

/* Toast */
#toasts{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.8));border:1px solid rgba(255,255,255,.7);color:var(--ink);padding:12px 18px;border-radius:14px;
  font-size:13px;font-weight:600;box-shadow:0 14px 40px rgba(30,40,90,.22),inset 0 1px 0 rgba(255,255,255,.9);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);animation:pop .25s ease;max-width:90vw}
.toast b{color:#1f8a4c}
@keyframes pop{from{opacity:0;transform:translateY(10px)}}

/* Charts */
.donutWrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.barchart{display:flex;align-items:flex-end;gap:14px;height:150px;padding-top:10px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.barcol .bar{width:100%;max-width:52px;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,#5a70e6,#2540c0);position:relative;transition:height .5s;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.barcol .bl{font-size:10.5px;color:var(--sub);font-weight:700;text-align:center}
.barcol .bv{font-size:12px;font-weight:800}

/* ================= REPORT DOCUMENT ================= */
.rpt{background:#fff;color:#14161c;font-family:'Helvetica Neue',Arial,Helvetica,sans-serif;font-size:10.5px;line-height:1.35;padding:0.42in 0.5in;width:8.5in;margin:0 auto}
.rpt .lh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid var(--navy);padding-bottom:10px;margin-bottom:2px}
.rpt .lh .rlogo{height:60px;width:auto;display:block}
.rpt .lh .contact{text-align:right;font-size:9.5px;color:#3a3f4a;line-height:1.5}
.rpt .lh .contact .a{font-weight:700;color:#22252d}
.rpt .titlebar{background:var(--navy);color:#fff;text-align:center;font-weight:700;letter-spacing:.6px;font-size:13px;padding:7px;margin:10px 0 12px;text-transform:uppercase;border-radius:2px}
.rpt .secbar{background:var(--navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 9px;margin:12px 0 0;border-radius:2px 2px 0 0}
.rpt table.kv{width:100%;border-collapse:collapse;margin:0 0 4px}
.rpt table.kv td{border:1px solid #c8cee0;padding:4px 8px;vertical-align:top;font-size:10px}
.rpt table.kv td.k{background:#eef1f9;color:#22304f;font-weight:700;white-space:nowrap;width:1%}
.rpt table.kv td.v{color:#1b1e26}
.rpt .multi{white-space:pre-line}
.rpt table.tst{width:100%;border-collapse:collapse;margin-top:0}
.rpt table.tst th{background:var(--navy);color:#fff;font-size:8.4px;font-weight:700;padding:5px 3px;border:1px solid #2b2f8f;line-height:1.15;text-align:center;vertical-align:middle}
.rpt table.tst td{border:1px solid #c8cee0;padding:4px 5px;font-size:9.6px;text-align:right;font-variant-numeric:tabular-nums}
.rpt table.tst td.l{text-align:left}
.rpt table.tst tr:nth-child(even) td{background:#f6f8fd}
.rpt .results{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid #c8cee0;border-top:none;background:#f2f5fc;padding:7px 10px;font-size:11px}
.rpt .results .avg{font-weight:700;color:#1b2340}
.rpt .rp{display:inline-block;padding:3px 12px;border-radius:4px;font-weight:800;font-size:11px;letter-spacing:.5px}
.rpt .rp.pass{background:#e2f5ea;color:#187a45;border:1px solid #8ed4ab}
.rpt .rp.rev{background:#fdf3dd;color:#8a6414;border:1px solid #e3c982}
.rpt .foot{font-size:7.8px;color:#4a4f5c;line-height:1.5;margin-top:10px}
.rpt .foot b{color:#22252d}
.rpt .remarks{border:1px solid #c8cee0;min-height:40px;padding:6px 9px;font-size:10px;margin-top:0;background:#fff}
.rpt .sig{display:flex;gap:36px;margin-top:20px}
.rpt .sig .col{flex:1}
.rpt .sig .line{border-bottom:1.4px solid #2a2d36;height:34px;position:relative;margin-bottom:4px}
.rpt .sig .cap{font-size:9.5px;color:#3a3f4a}
.rpt .sig .cap b{color:#1b1e26}
.rpt .script{position:absolute;left:6px;bottom:2px;font-family:'Segoe Script','Brush Script MT','Snell Roundhand',cursive;font-size:25px;color:#12235c;font-style:italic;transform:rotate(-3deg)}
.rpt .pending{position:absolute;left:6px;bottom:9px;font-size:9px;color:#9aa0ad;font-style:italic}
.rpt .sealWrap{display:flex;align-items:flex-end;gap:12px}
.rpt .seal{height:96px;width:96px;flex:none}
.rpt .sealTxt{font-size:8.6px;font-weight:700;fill:#2b2f8f;letter-spacing:.4px;font-family:'Helvetica Neue',Arial,sans-serif}
.rpt .sealCtr{font-size:8px;font-weight:800;fill:#2b2f8f;font-family:'Helvetica Neue',Arial,sans-serif}
.rpt .stampMeta{font-size:8.4px;color:#2b2f8f;font-weight:700;line-height:1.35}
.rpt .genline{text-align:center;font-size:8px;color:#8990a0;margin-top:14px;border-top:1px solid #e2e6f0;padding-top:6px}

/* Print */
#printArea{position:fixed;left:-10000px;top:0;width:8.5in;background:#fff}
@media print{
  @page{size:letter;margin:0.35in}
  body{background:#fff !important}
  body > *:not(#printArea){display:none !important}
  #printArea{position:static;left:0;display:block;width:100%}
  .rpt{width:100%;padding:0;box-shadow:none}
  .rpt table.tst tr:nth-child(even) td{background:#f6f8fd !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rpt .titlebar,.rpt .secbar,.rpt table.tst th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #printArea{background:#fff !important}
  #printArea *{filter:none !important;backdrop-filter:none !important;-webkit-backdrop-filter:none !important;box-shadow:none !important;text-shadow:none !important}
  #printArea *,#printArea{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;left:0;width:250px;transform:translateX(-104%);transition:transform .26s}
  .app.navopen .sidebar{transform:translateX(0)}
  .hamb{display:block}
  .tiles{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){.tiles{grid-template-columns:1fr}.form{grid-template-columns:1fr}.form .full{grid-column:1}.main{padding:18px 14px 50px}.topbar{padding:12px 14px}}

/* ---- grid toolbar / bulk / multiselect (Omnant parity) ---- */
.gridbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.gridSearch{padding:8px 12px;border-radius:10px;border:1px solid var(--line2);background:rgba(255,255,255,.72);color:var(--ink);font-size:12.5px;font-family:inherit;min-width:230px;transition:border-color .14s,box-shadow .14s,background .14s}
.gridSearch:focus{outline:none;border-color:rgba(58,80,220,.6);background:#fff;box-shadow:0 0 0 3px rgba(58,80,220,.16)}
.gridbar select{padding:8px 10px;border-radius:10px;border:1px solid var(--line2);background:rgba(255,255,255,.7);color:var(--ink);font-size:12.5px;font-family:inherit}
.gridbar .gap{flex:1}
.showing{font-size:11.5px;color:var(--dim);font-weight:600;padding:6px 2px}
.bulkbar{align-items:center;gap:10px;flex-wrap:wrap;padding:10px 14px;margin-bottom:12px;border-radius:12px;
  background:linear-gradient(120deg,rgba(48,64,200,.14),rgba(48,64,200,.06));border:1px solid rgba(48,64,200,.24);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.bulkbar b{color:#2540c0}
.chkcell{width:30px;text-align:center;padding-right:0 !important}
.tbl input[type=checkbox],.rec input[type=checkbox],.recchk{width:15px;height:15px;cursor:pointer;accent-color:#3a4fd6}
.recchk{position:absolute;top:10px;right:11px;z-index:2}
.rec{position:relative}
/* week grid + type tabs */
.wkgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.wkcol{background:rgba(255,255,255,.42);border:1px solid var(--line);border-radius:13px;padding:11px 10px;min-height:120px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.wkcol.today{border-color:rgba(201,162,74,.5);background:rgba(201,162,74,.08)}
.wkcol .wd{font-size:10.5px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.wkitem{font-size:11px;padding:7px 8px;border-radius:9px;margin-bottom:6px;background:rgba(255,255,255,.75);border:1px solid var(--line);cursor:pointer;transition:all .14s;box-shadow:0 2px 6px rgba(30,40,90,.06)}
.wkitem:hover{transform:translateY(-1px);box-shadow:0 5px 12px rgba(30,40,90,.12)}
.wkitem .wt{font-weight:700}
.typetabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.typetab{padding:6px 12px;border-radius:9px;background:rgba(255,255,255,.5);border:1px solid var(--line);cursor:pointer;font-size:12px;font-weight:700;color:var(--sub);transition:all .14s}
.typetab:hover{color:var(--ink)}
.typetab.active{background:rgba(48,64,200,.14);color:#1c2a8c;border-color:rgba(48,64,200,.28)}
/* printable label sheet */
.lblsheet{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;font-family:Arial}
.lbl{border:1.4px solid #14161c;border-radius:5px;padding:9px 10px;font-size:10px;color:#14161c;line-height:1.4}
.lbl .lid{font-size:14px;font-weight:800;letter-spacing:.5px}
.lbl .lqr{float:right;width:44px;height:44px;background:repeating-linear-gradient(45deg,#14161c 0 3px,#fff 3px 6px);border:1px solid #14161c}

/* ---------- Qure (concrete maturity add-on) ---------- */
.navItem.qgold svg{stroke:var(--gold)}
.navItem.qgold{color:#7a5f16}
.navItem.qgold:hover{background:rgba(201,162,74,.12);color:#5e480f}
.navItem.qgold.active{background:linear-gradient(120deg,rgba(201,162,74,.22),rgba(201,162,74,.08));color:#6e520f;border-color:rgba(201,162,74,.36);box-shadow:0 4px 14px rgba(150,120,40,.16),inset 0 1px 0 rgba(255,255,255,.7)}
.tile.gold .tv{color:#8a6a1e}
.tile.gold::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px;background:#c9a24a}
.qGoldBar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:13px 18px;border-radius:15px;margin-bottom:18px;
  background:linear-gradient(120deg,rgba(201,162,74,.16),rgba(58,80,220,.07));border:1px solid rgba(201,162,74,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.qGoldBar .oi{width:40px;height:40px;border-radius:11px;background:rgba(201,162,74,.20);border:1px solid rgba(201,162,74,.42);display:flex;align-items:center;justify-content:center;flex:none}
.batt{display:inline-flex;align-items:center;gap:6px}
.battTrack{width:34px;height:13px;border:1.5px solid var(--line2);border-radius:3px;position:relative;padding:1.5px;background:rgba(255,255,255,.5);display:inline-block}
.battTrack::after{content:"";position:absolute;right:-4px;top:3.5px;bottom:3.5px;width:2.5px;border-radius:0 2px 2px 0;background:var(--line2)}
.battFill{display:block;height:100%;border-radius:1.5px}
.sigbars{display:inline-flex;align-items:flex-end;gap:2px;height:14px}
.sigbars i{width:3.5px;background:rgba(28,40,110,.18);border-radius:1px;display:inline-block}
.sigbars i.on{background:#1f8a4c}
.qhealth{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:12px}
.qnode{background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);border-radius:14px;padding:13px 14px;box-shadow:0 4px 14px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9)}
.qnode .qnh{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.qnode .qnh b{font-size:13.5px}
.qbig{font-size:40px;font-weight:800;letter-spacing:-1.5px;line-height:1;color:var(--ink)}
.qprog{height:12px;border-radius:8px;background:rgba(28,40,110,.10);overflow:hidden;position:relative}
.qprog>i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,#2540c0,#5a70e6)}
.qprog.gold>i{background:linear-gradient(90deg,#c9a24a,#e0c078)}
.qprog.green>i{background:linear-gradient(90deg,#1f8a4c,#43d17f)}
.qchart{width:100%;height:auto;display:block}
.qptline{stroke:rgba(28,40,110,.10);stroke-width:1}
.qokStrip{background:rgba(31,138,76,.10);border:1px solid rgba(31,138,76,.28);color:#187a45;border-radius:8px;padding:8px 11px;font-size:12px}

/* ---------- Dashboard command center ---------- */
.kpiStrip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:18px}
.kpiStrip .tile{padding:13px 14px}
.kpiStrip .tile .tv{font-size:24px;margin-top:7px}
.kpiStrip .tile .ts{font-size:11px;margin-top:4px}
.dcols{display:grid;grid-template-columns:1fr;gap:16px;align-items:start;margin-bottom:16px}
.arow{display:flex;align-items:center;gap:11px;padding:10px 12px 10px 14px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.5));border:1px solid rgba(255,255,255,.78);margin-bottom:9px;cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.arow:last-child{margin-bottom:0}
.arow:hover{transform:translateY(-1px);border-color:#fff;box-shadow:var(--sh-md)}
.arow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}
.arow.red::before{background:#c0392b}.arow.amber::before{background:#b7791f}.arow.blue::before{background:#2540c0}.arow.gold::before{background:#c9a24a}.arow.green::before{background:#1f8a4c}
.arow .ai{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none;font-size:16px;background:rgba(58,80,220,.09);border:1px solid rgba(58,80,220,.14)}
.arow.red .ai{background:rgba(192,57,43,.10);border-color:rgba(192,57,43,.18)}
.arow.amber .ai{background:rgba(183,121,31,.12);border-color:rgba(183,121,31,.2)}
.arow.gold .ai{background:rgba(201,162,74,.16);border-color:rgba(201,162,74,.3)}
.arow .ab{flex:1;min-width:0}
.arow .ab .t{font-weight:700;font-size:13px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arow .ab .s{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arow .aa{display:flex;align-items:center;gap:7px;flex:none}
.mband{display:grid;grid-template-columns:repeat(3,minmax(0,auto)) 1fr;gap:26px;align-items:center}
