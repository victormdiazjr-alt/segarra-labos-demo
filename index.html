<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LabOS &mdash; Segarra Engineering</title>
<style>

:root{
  --r1:#102090;--r2:#203090;--deep:#001080;--light:#3040a0;--navy:#2b2f8f;
  --gold:#c9a24a;--gray:#6d6e71;
  --ink:#182042;--sub:#55608c;--dim:#8089ab;
  --glass:rgba(255,255,255,.55);--glass2:rgba(255,255,255,.75);
  --line:rgba(28,40,110,.12);--line2:rgba(28,40,110,.22);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
  background:radial-gradient(1000px 700px at 12% -5%,rgba(120,140,255,.10),transparent 60%),
    radial-gradient(900px 700px at 104% 8%,rgba(150,130,255,.08),transparent 55%),
    linear-gradient(180deg,#ffffff 0%,#eef1fb 100%);
  background-attachment:fixed;
}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(1200px 800px at 50% -20%,rgba(120,150,255,.06),transparent 60%);}
a{color:inherit;text-decoration:none}
::selection{background:rgba(80,110,255,.22)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(28,40,110,.20);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:rgba(28,40,110,.32)}
::-webkit-scrollbar-track{background:transparent}

.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh;position:relative;z-index:1}

/* ---------- Sidebar ---------- */
.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 14px 22px;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);
  border-right:1px solid var(--line);display:flex;flex-direction:column;gap:6px;z-index:20;
  box-shadow:inset -1px 0 0 rgba(255,255,255,.5)}
.logoPlate{background:none;border:none;box-shadow:none;border-radius:0;padding:6px 10px 12px;margin-bottom:4px}
.logoPlate img{width:100%;height:auto;display:block}
.sideCap{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim);
  font-weight:700;margin:12px 8px 4px}
.navItem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;cursor:pointer;
  color:var(--sub);font-weight:600;font-size:13.5px;transition:all .18s ease;border:1px solid transparent;position:relative}
.navItem:hover{background:rgba(58,80,220,.10);color:var(--ink)}
.navItem.active{background:linear-gradient(120deg,rgba(48,64,200,.16),rgba(48,64,200,.08));
  color:#1c2a8c;border-color:rgba(48,64,200,.22);box-shadow:0 4px 14px rgba(40,60,180,.14),inset 0 1px 0 rgba(255,255,255,.7)}
.navItem svg{width:19px;height:19px;flex:none;stroke-width:1.7}
.navItem .nb{margin-left:auto;background:rgba(58,80,220,.14);color:#2540c0;font-size:11px;font-weight:800;
  min-width:20px;height:20px;padding:0 6px;border-radius:20px;display:flex;align-items:center;justify-content:center}
.navItem .nb.warn{background:rgba(192,57,43,.15);color:#b03325}
.navItem .nb.gold{background:rgba(201,162,74,.22);color:#8a6a1e}
.sideFoot{margin-top:auto;font-size:10.5px;color:var(--dim);padding:10px 8px 0;line-height:1.5}
.gap{flex:1}

/* ---------- Main ---------- */
.mainWrap{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:15;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 26px;background:rgba(255,255,255,.8);
  backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border-bottom:1px solid var(--line)}
.hamb{display:none;background:var(--glass2);border:1px solid var(--line2);color:var(--ink);width:38px;height:38px;
  border-radius:11px;font-size:18px;cursor:pointer}
.pageTitle{display:flex;flex-direction:column;line-height:1.15}
.pageTitle b{font-size:19px;font-weight:800;letter-spacing:-.3px}
.pageTitle .tag{font-size:11.5px;color:#8a6a1e;font-weight:700;letter-spacing:.2px}
.topSpace{flex:1}
.syncChip{display:flex;align-items:center;gap:9px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 4px 14px rgba(30,40,90,.10),inset 0 1px 0 rgba(255,255,255,.9);
  padding:7px 12px;border-radius:12px;font-size:12px;color:var(--sub);font-weight:600}
.syncDot{width:8px;height:8px;border-radius:50%;background:#e0a020;box-shadow:0 0 0 4px rgba(224,160,32,.16)}
.syncChip.ok .syncDot{background:#1f8a4c;box-shadow:0 0 0 4px rgba(31,138,76,.16)}
.syncChip button{background:linear-gradient(180deg,#3a4fd6,#2b3bb0);border:1px solid rgba(255,255,255,.35);color:#fff;font-weight:700;
  padding:4px 10px;border-radius:9px;cursor:pointer;font-size:11.5px;font-family:inherit;box-shadow:0 2px 8px rgba(30,45,160,.22),inset 0 1px 0 rgba(255,255,255,.35)}
.syncChip button:hover{filter:brightness(1.08)}
.kbd{border:1px solid var(--line2);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:11px;
  color:var(--sub);font-weight:700;background:rgba(255,255,255,.7)}
.cmdBtn{display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 4px 14px rgba(30,40,90,.10),inset 0 1px 0 rgba(255,255,255,.9);
  padding:7px 11px;border-radius:11px;font-size:12.5px;color:var(--sub);cursor:pointer;font-weight:600}
.cmdBtn:hover{color:var(--ink);box-shadow:0 6px 18px rgba(30,40,90,.14),inset 0 1px 0 rgba(255,255,255,.9)}

.main{padding:24px 26px 60px;min-height:0}
.viewHead{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.viewHead h1{margin:0;font-size:24px;font-weight:800;letter-spacing:-.5px;color:#141a5e}
.viewHead p{margin:2px 0 0;color:#434a83;font-size:13px}

.btn{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.62));border:1px solid var(--line2);color:var(--ink);padding:8px 14px;border-radius:11px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 2px 8px rgba(30,40,90,.12),inset 0 1px 0 #fff;
  font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .16s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(30,40,90,.16),inset 0 1px 0 #fff;filter:brightness(1.02)}
.btn.primary{background:linear-gradient(180deg,#4a5fe6,#2b3bb0);border-color:rgba(255,255,255,.4);color:#fff;box-shadow:0 6px 18px rgba(30,45,160,.30),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.primary:hover{background:linear-gradient(180deg,#5a6ff6,#3242c0)}
.btn.ok{background:linear-gradient(180deg,#2bb069,#158048);border-color:rgba(255,255,255,.4);color:#fff;box-shadow:0 6px 18px rgba(20,120,70,.28),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.ok:hover{filter:brightness(1.08)}
.btn.gold{background:linear-gradient(180deg,#d8b25e,#a8863a);border-color:rgba(255,255,255,.45);color:#2a2005;box-shadow:0 6px 18px rgba(150,120,40,.28),inset 0 1px 0 rgba(255,255,255,.55)}
.btn.ghost{background:rgba(255,255,255,.4);border-color:var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.btn.sm{padding:6px 11px;font-size:11.5px;border-radius:9px}
.btn.danger{background:linear-gradient(180deg,#d85e4d,#a23b2f);border-color:rgba(255,255,255,.4);color:#fff;box-shadow:0 6px 18px rgba(160,50,40,.28),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.iconbtn{padding:0;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;flex:none}

/* ---------- Cards / glass ---------- */
.glass{background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);border-radius:18px;
  box-shadow:0 8px 30px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(255,255,255,.25);
  backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%)}
.pad{padding:18px 20px}
.grid{display:grid;gap:16px}
.cardTitle{font-size:12.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);
  margin:0 0 14px;display:flex;align-items:center;gap:9px}
.cardTitle .cnt{background:rgba(58,80,220,.10);border:1px solid rgba(58,80,220,.18);border-radius:8px;padding:1px 8px;font-size:11px;color:#2540c0;font-weight:700}
.cardTitle .mr{margin-left:auto;font-weight:600;text-transform:none;letter-spacing:0}

/* KPI tiles */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.tile{background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:16px 17px;position:relative;overflow:hidden;
  box-shadow:0 6px 22px rgba(30,40,90,.10),inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(255,255,255,.25);
  backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);transition:all .18s;cursor:default}
.tile:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.9);box-shadow:0 14px 34px rgba(30,40,90,.16),inset 0 1px 0 rgba(255,255,255,.9)}
.tile .tl{font-size:11.5px;color:var(--sub);font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:7px}
.tile .tv{font-size:29px;font-weight:800;letter-spacing:-1px;margin-top:8px;line-height:1;color:var(--ink)}
.tile .ts{font-size:11.5px;color:var(--dim);margin-top:5px;font-weight:600}
.tile .spark{position:absolute;right:-4px;bottom:-4px;width:64px;height:44px;opacity:.5}
.tile.red .tv{color:#c0392b}.tile.amber .tv{color:#b7791f}.tile.green .tv{color:#1f8a4c}.tile.blue .tv{color:#2540c0}
.tile.red::before,.tile.amber::before,.tile.green::before,.tile.blue::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px}
.tile.red::before{background:#c0392b}.tile.amber::before{background:#b7791f}.tile.green::before{background:#1f8a4c}.tile.blue::before{background:#2540c0}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;color:var(--dim);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  padding:9px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(28,40,110,.08);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .14s}
.tbl tbody tr.click{cursor:pointer}
.tbl tbody tr.click:hover{background:rgba(58,80,220,.06)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tbl b{font-weight:700}
.muted{color:var(--dim)}
.mono{font-variant-numeric:tabular-nums}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.3px;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
.pill.green{background:rgba(31,138,76,.14);color:#1a7a44}
.pill.amber{background:rgba(183,121,31,.16);color:#9a6410}
.pill.red{background:rgba(192,57,43,.14);color:#b03325}
.pill.blue{background:rgba(37,64,192,.14);color:#2540c0}
.pill.gray{background:rgba(80,90,130,.12);color:#4a5480}
.pill.gold{background:rgba(201,162,74,.18);color:#8a6a1e}

.seed{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:800;color:#8a6a1e;
  background:rgba(201,162,74,.16);border:1px solid rgba(201,162,74,.4);padding:1px 6px;border-radius:6px;letter-spacing:.4px;vertical-align:middle}

.flag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:2px 8px;border-radius:7px}
.flag.red{background:rgba(192,57,43,.14);color:#b03325}
.flag.amber{background:rgba(183,121,31,.16);color:#9a6410}

/* Column board */
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.col{background:rgba(255,255,255,.4);border:1px solid var(--line);border-radius:16px;padding:14px;min-height:120px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.colHead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:12px}
.colHead .dot{width:9px;height:9px;border-radius:50%}
.colHead .cc{margin-left:auto;background:rgba(58,80,220,.10);border-radius:7px;padding:0 8px;font-size:11px;color:#2540c0;font-weight:700}
.rec{background:linear-gradient(180deg,rgba(255,255,255,.8),rgba(255,255,255,.5));border:1px solid rgba(255,255,255,.75);border-radius:12px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:all .16s;box-shadow:0 3px 12px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9)}
.rec:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.95);box-shadow:0 8px 20px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.rec .rt{font-weight:700;font-size:13px}
.rec .rs{font-size:11.5px;color:var(--dim);margin-top:3px}
.rec .rrow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
/* --- report thumbnail preview --- */
.thumb{position:relative;width:160px;height:212px;overflow:hidden;background:#fff;border:1px solid var(--line2);border-radius:9px;box-shadow:0 6px 18px rgba(30,40,90,.16);cursor:pointer;margin:0 0 11px;transition:transform .16s ease, box-shadow .16s ease}
.thumb:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(30,40,90,.24)}
.thumbInner{width:816px;transform:scale(.196);transform-origin:top left;pointer-events:none;-webkit-user-select:none;user-select:none}
.thumbOverlay{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:.4px;color:#fff;background:linear-gradient(to top,rgba(14,20,64,.9),rgba(14,20,64,0));padding:16px 0 6px;opacity:.92;transition:opacity .16s}
.thumb:hover .thumbOverlay{opacity:1}
.thumbOverlay .mag{font-size:12px}
.declNote{font-size:11px;color:#b03325;background:rgba(192,57,43,.10);border:1px solid rgba(192,57,43,.28);border-radius:8px;padding:6px 9px;margin-top:8px;line-height:1.4}
.declNote b{color:#932a1f}
/* --- decline reason panel (in report modal) --- */
.declinePanel{display:none;align-items:center;flex-wrap:wrap;gap:10px;padding:11px 16px;background:rgba(252,232,230,.96);border-bottom:1px solid rgba(192,57,43,.3)}
.declinePanel.open{display:flex}
.declinePanel label{font-size:12px;font-weight:700;color:#932a1f}
.declineInput{flex:1;min-width:220px;background:rgba(255,255,255,.85);border:1px solid rgba(192,57,43,.35);color:#3a1512;padding:8px 12px;border-radius:9px;font-size:12.5px;font-family:inherit}
.declineInput::placeholder{color:rgba(147,42,31,.55)}
.declBanner{background:rgba(252,232,230,.95);color:#932a1f;font-size:12px;padding:9px 16px;border-bottom:1px solid rgba(192,57,43,.3)}
.declBanner b{color:#b03325}

.lrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);margin-bottom:10px;transition:all .16s;cursor:pointer;box-shadow:0 4px 14px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9)}
.lrow:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.95);box-shadow:0 8px 20px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.lrow .li{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none;font-size:17px;background:rgba(58,80,220,.10);border:1px solid rgba(58,80,220,.16)}
.lrow .lb{flex:1;min-width:0}
.lrow .lb .t{font-weight:700;font-size:13.5px}
.lrow .lb .s{font-size:11.5px;color:var(--dim);margin-top:2px}
.lrow .la{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}

.stat{display:flex;flex-direction:column;gap:2px}
.stat .sv{font-size:24px;font-weight:800;letter-spacing:-.5px}
.stat .sl{font-size:11px;color:var(--sub);font-weight:600}

.metaGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.mfield{background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.mfield .k{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.mfield .v{font-size:14px;font-weight:700;margin-top:4px}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.subtabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.subtab{padding:8px 15px;border-radius:11px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));border:1px solid rgba(255,255,255,.7);cursor:pointer;
  box-shadow:0 3px 10px rgba(30,40,90,.08),inset 0 1px 0 rgba(255,255,255,.9);
  font-weight:700;font-size:12.5px;color:var(--sub);transition:all .16s;display:flex;align-items:center;gap:8px}
.subtab:hover{color:var(--ink);box-shadow:0 5px 14px rgba(30,40,90,.12),inset 0 1px 0 rgba(255,255,255,.9)}
.subtab.active{background:linear-gradient(120deg,rgba(48,64,200,.16),rgba(48,64,200,.08));color:#1c2a8c;border-color:rgba(48,64,200,.22)}
.subtab .sc{background:rgba(58,80,220,.14);color:#2540c0;border-radius:7px;padding:0 7px;font-size:11px}

.omnantBar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:13px 18px;border-radius:15px;margin-bottom:18px;
  background:linear-gradient(120deg,rgba(201,162,74,.12),rgba(58,80,220,.10));border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
.omnantBar .oi{width:40px;height:40px;border-radius:11px;background:rgba(201,162,74,.20);border:1px solid rgba(201,162,74,.4);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.omnantBar .ot{font-weight:800;font-size:13.5px}
.omnantBar .os{font-size:11.5px;color:var(--sub);margin-top:2px}

.empty{padding:26px;text-align:center;color:var(--dim);font-size:12.5px}

/* Forms */
.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form label{display:flex;flex-direction:column;font-size:11.5px;color:var(--sub);font-weight:700;gap:6px}
.form input,.form select,.form textarea{padding:10px 12px;border-radius:11px;border:1px solid var(--line2);
  background:rgba(255,255,255,.7);color:var(--ink);font-size:13px;font-family:inherit}
.form input:focus,.form select:focus{outline:none;border-color:rgba(58,80,220,.55);background:rgba(255,255,255,.95)}
.form .full{grid-column:1/3}
.form option{background:#fff;color:var(--ink)}

/* ---------- Drawer ---------- */
.drawerBack{position:fixed;inset:0;background:rgba(20,28,60,.28);backdrop-filter:blur(3px);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s}
.drawerBack.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,94vw);z-index:41;transform:translateX(102%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;
  background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(255,255,255,.74));backdrop-filter:blur(26px) saturate(140%);-webkit-backdrop-filter:blur(26px) saturate(140%);
  border-left:1px solid rgba(255,255,255,.7);box-shadow:-30px 0 80px rgba(30,40,90,.18)}
.drawer.open{transform:translateX(0)}
.drawerHead{position:sticky;top:0;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:18px 22px;
  border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;z-index:2}
.drawerHead h2{margin:0;font-size:18px;font-weight:800}
.drawerHead .sub{font-size:12px;color:var(--sub);margin-top:3px}
.drawerHead .x{margin-left:auto;background:var(--glass2);border:1px solid var(--line2);color:var(--ink);width:34px;height:34px;
  border-radius:10px;cursor:pointer;font-size:16px;flex:none}
.drawerBody{padding:20px 22px 40px}
.dsect{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);margin:20px 0 10px}
.dsect:first-child{margin-top:0}

/* ---------- Command palette ---------- */
.cmdBack{position:fixed;inset:0;background:rgba(20,28,60,.3);backdrop-filter:blur(5px);z-index:70;display:none;padding-top:12vh}
.cmdBack.open{display:block}
.cmdBox{max-width:600px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(255,255,255,.78));
  backdrop-filter:blur(26px) saturate(140%);-webkit-backdrop-filter:blur(26px) saturate(140%);
  border:1px solid rgba(255,255,255,.7);border-radius:18px;overflow:hidden;box-shadow:0 40px 100px rgba(30,40,90,.28),inset 0 1px 0 rgba(255,255,255,.9)}
.cmdBox input{width:100%;border:none;background:transparent;color:var(--ink);font-size:16px;padding:18px 20px;font-family:inherit;
  border-bottom:1px solid var(--line);outline:none}
.cmdBox input::placeholder{color:var(--dim)}
.cmdList{max-height:52vh;overflow-y:auto;padding:8px}
.cmdRow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;cursor:pointer;font-size:13.5px}
.cmdRow.sel,.cmdRow:hover{background:rgba(58,80,220,.10)}
.cmdRow .ci{width:26px;height:26px;border-radius:8px;background:rgba(58,80,220,.10);border:1px solid rgba(58,80,220,.16);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.cmdRow .cg{margin-left:auto;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700}

/* ---------- Modal (report) ---------- */
.modalBack{position:fixed;inset:0;background:rgba(20,28,60,.4);backdrop-filter:blur(4px);z-index:60;display:none;overflow:auto;padding:26px 14px}
.modalBack.open{display:block}
.modalCard{max-width:900px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 30px 90px rgba(30,40,90,.3)}
.modalBar{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;padding:11px 16px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border-bottom:1px solid var(--line2)}
.modalBar .mbL{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.modalBar .t{font-weight:800;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.modalBar .mbR{display:flex;align-items:center;gap:8px;flex:none}

/* Toast */
#toasts{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.8));border:1px solid rgba(255,255,255,.7);color:var(--ink);padding:12px 18px;border-radius:14px;
  font-size:13px;font-weight:600;box-shadow:0 14px 40px rgba(30,40,90,.22),inset 0 1px 0 rgba(255,255,255,.9);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);animation:pop .25s ease;max-width:90vw}
.toast b{color:#1f8a4c}
@keyframes pop{from{opacity:0;transform:translateY(10px)}}

/* Charts */
.donutWrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.barchart{display:flex;align-items:flex-end;gap:14px;height:150px;padding-top:10px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.barcol .bar{width:100%;max-width:52px;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,#5a70e6,#2540c0);position:relative;transition:height .5s;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.barcol .bl{font-size:10.5px;color:var(--sub);font-weight:700;text-align:center}
.barcol .bv{font-size:12px;font-weight:800}

/* ================= REPORT DOCUMENT ================= */
.rpt{background:#fff;color:#14161c;font-family:'Helvetica Neue',Arial,Helvetica,sans-serif;font-size:10.5px;line-height:1.35;padding:0.42in 0.5in;width:8.5in;margin:0 auto}
.rpt .lh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid var(--navy);padding-bottom:10px;margin-bottom:2px}
.rpt .lh .rlogo{height:60px;width:auto;display:block}
.rpt .lh .contact{text-align:right;font-size:9.5px;color:#3a3f4a;line-height:1.5}
.rpt .lh .contact .a{font-weight:700;color:#22252d}
.rpt .titlebar{background:var(--navy);color:#fff;text-align:center;font-weight:700;letter-spacing:.6px;font-size:13px;padding:7px;margin:10px 0 12px;text-transform:uppercase;border-radius:2px}
.rpt .secbar{background:var(--navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:4px 9px;margin:12px 0 0;border-radius:2px 2px 0 0}
.rpt table.kv{width:100%;border-collapse:collapse;margin:0 0 4px}
.rpt table.kv td{border:1px solid #c8cee0;padding:4px 8px;vertical-align:top;font-size:10px}
.rpt table.kv td.k{background:#eef1f9;color:#22304f;font-weight:700;white-space:nowrap;width:1%}
.rpt table.kv td.v{color:#1b1e26}
.rpt .multi{white-space:pre-line}
.rpt table.tst{width:100%;border-collapse:collapse;margin-top:0}
.rpt table.tst th{background:var(--navy);color:#fff;font-size:8.4px;font-weight:700;padding:5px 3px;border:1px solid #2b2f8f;line-height:1.15;text-align:center;vertical-align:middle}
.rpt table.tst td{border:1px solid #c8cee0;padding:4px 5px;font-size:9.6px;text-align:right;font-variant-numeric:tabular-nums}
.rpt table.tst td.l{text-align:left}
.rpt table.tst tr:nth-child(even) td{background:#f6f8fd}
.rpt .results{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid #c8cee0;border-top:none;background:#f2f5fc;padding:7px 10px;font-size:11px}
.rpt .results .avg{font-weight:700;color:#1b2340}
.rpt .rp{display:inline-block;padding:3px 12px;border-radius:4px;font-weight:800;font-size:11px;letter-spacing:.5px}
.rpt .rp.pass{background:#e2f5ea;color:#187a45;border:1px solid #8ed4ab}
.rpt .rp.rev{background:#fdf3dd;color:#8a6414;border:1px solid #e3c982}
.rpt .foot{font-size:7.8px;color:#4a4f5c;line-height:1.5;margin-top:10px}
.rpt .foot b{color:#22252d}
.rpt .remarks{border:1px solid #c8cee0;min-height:40px;padding:6px 9px;font-size:10px;margin-top:0;background:#fff}
.rpt .sig{display:flex;gap:36px;margin-top:20px}
.rpt .sig .col{flex:1}
.rpt .sig .line{border-bottom:1.4px solid #2a2d36;height:34px;position:relative;margin-bottom:4px}
.rpt .sig .cap{font-size:9.5px;color:#3a3f4a}
.rpt .sig .cap b{color:#1b1e26}
.rpt .script{position:absolute;left:6px;bottom:2px;font-family:'Segoe Script','Brush Script MT','Snell Roundhand',cursive;font-size:25px;color:#12235c;font-style:italic;transform:rotate(-3deg)}
.rpt .pending{position:absolute;left:6px;bottom:9px;font-size:9px;color:#9aa0ad;font-style:italic}
.rpt .sealWrap{display:flex;align-items:flex-end;gap:12px}
.rpt .seal{height:96px;width:96px;flex:none}
.rpt .sealTxt{font-size:8.6px;font-weight:700;fill:#2b2f8f;letter-spacing:.4px;font-family:'Helvetica Neue',Arial,sans-serif}
.rpt .sealCtr{font-size:8px;font-weight:800;fill:#2b2f8f;font-family:'Helvetica Neue',Arial,sans-serif}
.rpt .stampMeta{font-size:8.4px;color:#2b2f8f;font-weight:700;line-height:1.35}
.rpt .genline{text-align:center;font-size:8px;color:#8990a0;margin-top:14px;border-top:1px solid #e2e6f0;padding-top:6px}

/* Print */
#printArea{position:fixed;left:-10000px;top:0;width:8.5in;background:#fff}
@media print{
  @page{size:letter;margin:0.35in}
  body{background:#fff !important}
  body > *:not(#printArea){display:none !important}
  #printArea{position:static;left:0;display:block;width:100%}
  .rpt{width:100%;padding:0;box-shadow:none}
  .rpt table.tst tr:nth-child(even) td{background:#f6f8fd !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rpt .titlebar,.rpt .secbar,.rpt table.tst th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;left:0;width:250px;transform:translateX(-104%);transition:transform .26s}
  .app.navopen .sidebar{transform:translateX(0)}
  .hamb{display:block}
  .tiles{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){.tiles{grid-template-columns:1fr}.form{grid-template-columns:1fr}.form .full{grid-column:1}.main{padding:18px 14px 50px}.topbar{padding:12px 14px}}

</style>
</head>

  overdue:'red', paid:'green', requested:'amber', dispatched:'blue', scheduled:'blue', done:'green', active:'green',
  expiring:'amber', curing:'blue', tested:'green', 'not-connected':'red'
};
function pill(s){ if(!s) return ""; const cls=PILL[s]||'gray'; return `<span class="pill ${cls}">${esc(String(s).replace(/-/g,' '))}</span>`; }

/* avg / result (ACI 318) */
function avg28(set){
  const t=(set.specimens||[]).filter(s=>s.tested && /28/.test(s.breakAge||""));
  if(!t.length) return null;
  return Math.round(t.reduce((a,s)=>a+(s.strength_psi||0),0)/t.length);
}
function result(set){
  const v=avg28(set); if(v==null) return "Pending";
  const req=set.requiredStrength||0;
  const t=(set.specimens||[]).filter(s=>s.tested && /28/.test(s.breakAge||""));
  const avgOk=v>=req;
  const indOk=t.every(s=>(s.strength_psi||0) >= req-500);
  return (avgOk&&indOk)?"Comply":"Review";
}

function toast(html){
  const t=document.createElement("div"); t.className="toast"; t.innerHTML=html;
  $("#toasts").appendChild(t); setTimeout(()=>{ t.style.transition="opacity .4s"; t.style.opacity="0"; setTimeout(()=>t.remove(),400); }, 2600);
}

function mfield(k,v){ return `<div class="mfield"><div class="k">${k}</div><div class="v">${v}</div></div>`; }
function spark(vals){
  const w=64,h=44,mx=Math.max(...vals),mn=Math.min(...vals);
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${h-4-((v-mn)/(mx-mn||1))*(h-8)}`).join(" ");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="rgba(48,64,200,.85)" stroke-width="2"/></svg>`;
}

/* real scaled render of the report document as a clickable PDF-style thumbnail */
function reportThumb(r){
  if(!r || r.status==='waiting') return '';
  const set=setById(r.setId); if(!set || !set.id) return '';
  const signed=(r.status==='approved'||r.status==='sent');
  let inner;
  try{ inner=reportHTML(set,{signed}); }
  catch(e){ inner='<div style="padding:60px 20px;color:#55608c;font-family:Arial;text-align:center">Preview unavailable</div>'; }
  return `<div class="thumb" onclick="event.stopPropagation();openReport('${r.setId}')" title="Open full report preview">
    <div class="thumbInner">${inner}</div>
    <div class="thumbOverlay"><span class="mag">&#128269;</span>Preview</div>
  </div>`;
}

function queueBtn(r){

function setStats(){
  const sets=db.sampleSets;

  const avg=allStr.length?Math.round(allStr.reduce((a,b)=>a+b,0)/allStr.length):0;
  const complyPct=done?Math.round(comply/done*100):0;
  const rows=sets.map(s=>{const v=avg28(s);const res=result(s);
    return `<tr class="click" onclick="openReport('${s.id}')"><td><b>${esc(s.id)}</b></td><td>${esc(pj(s.projectId).name)}</td>

function closeModal(){ $("#modalBack").classList.remove("open"); state.modalSet=null; }
function approve(setId){
  const set=setById(setId); const rep=repBySet(setId);
  if(!rep) return;
  rep.status="approved"; rep.reviewedBy="Ruben Segarra-Montelara, PE"; rep.approvedDate=TODAY;

  delete rep.declineReason; delete rep.declinedDate;

/* ================= EQUIPMENT ================= */
function viewEquipment(){
  const rows=db.equipment.map(e=>{
    const d=daysUntil(e.calDue);
    let flag='';
    if(d!=null){ if(d<=0) flag=`<span class="flag red">Cal overdue</span>`; else if(d<=30) flag=`<span class="flag red">Cal in ${d}d</span>`; else if(new Date(e.calDue)<=new Date('2026-08-31')) flag=`<span class="flag amber">Cal in ${d}d</span>`; }
    const forney = e.integration==='not-connected';
    return `<tr>
      <td><b>${esc(e.name)}</b> ${seed(e)}${forney?'<div class="s muted" style="font-size:11px;color:#c0392b;margin-top:2px">Not connected &mdash; live break capture is the #1 gap</div>':''}</td>
      <td>${esc(e.type)}</td><td>${esc(e.location)}</td><td>${pill(e.status)}</td>
      <td>${e.calDue?fmtDate(e.calDue):'&mdash;'} ${flag}</td>
      <td class="num">${forney?`<button class="btn gold sm" onclick="forneyDemo()">Connect &amp; capture</button>`:''}</td></tr>`;
  }).join("");
  const reminders=db.equipment.filter(e=>{const d=daysUntil(e.calDue);return d!=null&&new Date(e.calDue)<=new Date('2026-08-31');})
    .map(e=>`<div class="lrow"><div class="li">&#9888;</div><div class="lb"><div class="t">${esc(e.name)}</div>
      <div class="s">Calibration due ${fmtDate(e.calDue)} &middot; ${daysUntil(e.calDue)} days</div></div>
      <div class="la"><button class="btn sm" onclick="scheduleCal('${e.id}')">Schedule cal</button></div></div>`).join("")||`<div class="empty">No calibrations due before Aug 31, 2026.</div>`;
  const mnt=db.equipmentMaintenance.map(m=>{const e=db.equipment.find(x=>x.id===m.equipmentId)||{};
    return `<div class="lrow"><div class="li">&#128295;</div><div class="lb"><div class="t">${esc(e.name||m.equipmentId)} ${seed(m)}</div>
      <div class="s">${fmtDate(m.date)} &middot; ${esc(m.action)}</div></div><div class="la"><span class="muted">${esc(m.by)}</span></div></div>`;}).join("");
  return `
    <div class="viewHead"><div><h1>Equipment</h1><p>${db.equipment.length} assets &middot; calibration &amp; maintenance tracking</p></div></div>
    <div class="glass pad" style="margin-bottom:16px"><div class="cardTitle">Asset list</div>
      <table class="tbl"><thead><tr><th>Asset</th><th>Type</th><th>Location</th><th>Status</th><th>Calibration due</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div class="grid" style="grid-template-columns:1fr 1fr">
      ${card('Calibration reminders', reminders)}
      ${card('Maintenance log', mnt)}
    </div>`;
}
function forneyDemo(){
  toast("Connecting to Forney compression machine... (simulated)");
  setTimeout(()=>toast("Captured live break: <b>4,910 psi</b> @ 28d &mdash; auto-logged to LabOS."),900);
}
function scheduleCal(id){ const e=db.equipment.find(x=>x.id===id); toast(`Calibration scheduled for <b>${esc(e.name)}</b> (simulated).`); }

/* ================= QUALITY ================= */
function viewQuality(){
  const q=db.quality;
  const board=(title,arr,icon,titler,subber)=>{
    const recs=arr.length?arr.map(r=>`<div class="rec" onclick="openQuality('${title}','${r.id}')">
      <div class="rt">${icon} ${esc(r.id)} ${seed(r)}</div>
      <div class="rs">${titler(r)}</div>
      <div class="rrow">${pill(r.status)}<span class="muted" style="font-size:11px">${subber?subber(r):''}</span></div></div>`).join(""):`<div class="empty">None open.</div>`;
    return `<div class="col"><div class="colHead">${title}<span class="cc">${arr.length}</span></div>${recs}</div>`;
  };
  return `
    <div class="viewHead"><div><h1>Quality</h1><p>QA/QC &mdash; complaints, non-conforming work, corrective &amp; preventive actions, improvements</p></div></div>
    <div class="board">
      ${board('Complaints', q.complaints, '&#128227;', r=>esc(r.subject), r=>fmtDate(r.date))}
      ${board('Non-Conforming (NCR)', q.nonConforming, '&#9940;', r=>esc(r.desc), r=>esc(r.severity||''))}
      ${board('Corrective (CAR)', q.correctiveActions, '&#128736;', r=>esc(r.desc), r=>r.due?('due '+fmtDate(r.due)):'')}
      ${board('Preventive (PAR)', q.preventiveActions, '&#128737;', r=>esc(r.desc), r=>'')}
      ${board('Improvements', q.improvements, '&#11088;', r=>esc(r.desc), r=>'')}
    </div>`;
}
const QMAP={'Complaints':'complaints','Non-Conforming (NCR)':'nonConforming','Corrective (CAR)':'correctiveActions','Preventive (PAR)':'preventiveActions','Improvements':'improvements'};
const QFLOW={open:'under-review','under-review':'closed',planned:'in-progress','in-progress':'completed'};
function openQuality(title,id){
  const arr=db.quality[QMAP[title]]; const r=arr.find(x=>x.id===id);
  const fields=Object.entries(r).filter(([k])=>!k.startsWith('_')).map(([k,v])=>{
    let val=v; if(k==='client')val=cl(v).name; if(k==='project')val=pj(v).name; if(k==='owner')val=nameOf(v)||v; if(k==='linkedTo')val=v;
    return mfield(k.replace(/([A-Z])/g,' $1'), esc(val));
  }).join("");
  const next=QFLOW[r.status];
  openDrawer(`${r.id} ${seed(r)}`, esc(title), `
    <div class="dsect">Status</div>
    <div class="chips"><div style="flex:1">${pill(r.status)}</div>${next?`<button class="btn ok sm" onclick="advanceQuality('${title}','${id}')">Advance &rarr; ${esc(next.replace(/-/g,' '))}</button>`:''}</div>
    <div class="dsect">Details</div><div class="metaGrid">${fields}</div>`);
}
function advanceQuality(title,id){
  const r=db.quality[QMAP[title]].find(x=>x.id===id); const next=QFLOW[r.status];
  if(next){ r.status=next; toast(`${esc(r.id)} advanced to <b>${esc(next.replace(/-/g,' '))}</b>.`); }
  closeDrawer(); render();
}

/* ================= SCHEDULING ================= */
function schedIcon(t){ return {'Work Order':'&#128296;','Pickup':'&#128666;','Drop Off':'&#128230;','Meeting':'&#128197;'}[t]||'&#128204;'; }
function schedColor(t){ return {'Work Order':'#2540c0','Pickup':'#b7791f','Drop Off':'#1f8a4c','Meeting':'#8a6a1e'}[t]||'#8089ab'; }
function viewScheduling(){
  const byDate={};
  db.scheduling.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });
  const dates=Object.keys(byDate).sort();
  const blocks=dates.map(d=>{
    const items=byDate[d].map(s=>`<div class="lrow" onclick="openSchedule('${s.id}')">
      <div class="li" style="color:${schedColor(s.type)}">${schedIcon(s.type)}</div>
      <div class="lb"><div class="t">${esc(s.type)} &middot; ${esc(pj(s.project).name)} ${seed(s)}</div>
        <div class="s">${esc(s.task)} &middot; ${esc(nameOf(s.tech)||s.tech)}</div></div>
      <div class="la">${pill(s.status)}</div></div>`).join("");
    const isToday=d===TODAY;
    return `<div class="glass pad" style="margin-bottom:14px${isToday?';border-color:rgba(201,162,74,.4)':''}">
      <div class="cardTitle">${fmtDate(d)} ${isToday?'<span class="pill gold">today</span>':''}<span class="cnt">${byDate[d].length}</span></div>${items}</div>`;
  }).join("");
  return `
    <div class="viewHead"><div><h1>Scheduling</h1><p>Dispatch board &middot; work orders, pickups, drop-offs, meetings</p></div>
      <div class="gap"></div><button class="btn primary" onclick="createWO()">+ Create work order</button></div>
    ${blocks}`;
}
function openSchedule(id){
  const s=db.scheduling.find(x=>x.id===id);
  openDrawer(`${s.type} &middot; ${s.id} ${seed(s)}`, esc(pj(s.project).name), `
    <div class="dsect">Assignment</div>
    <div class="metaGrid">${mfield('Type', esc(s.type))}${mfield('Date', fmtDate(s.date))}
      ${mfield('Technician', esc(nameOf(s.tech)||s.tech))}${mfield('Project', esc(pj(s.project).name))}
      ${mfield('Task', esc(s.task))}${mfield('Status', esc(s.status))}</div>
    <div class="dsect">Actions</div>
    <div class="chips">
      ${s.status!=='done'?`<button class="btn ok sm" onclick="advanceSchedule('${id}')">Mark done</button>`:''}
      <button class="btn ghost sm iconbtn" onclick="closeDrawer()" title="Close" aria-label="Close"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>`);
}
function advanceSchedule(id){ const s=db.scheduling.find(x=>x.id===id); s.status='done'; toast(`${esc(s.type)} <b>${s.id}</b> marked done.`); closeDrawer(); render(); }
function createWO(){
  const techOpts=db.staff.filter(s=>s.dept==='ops-lab').map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("");
  const projOpts=db.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("");
  openDrawer('Create work order','Dispatch a new field task',`
    <div class="form">
      <label>Type<select id="woType"><option>Work Order</option><option>Pickup</option><option>Drop Off</option><option>Meeting</option></select></label>
      <label>Date<input id="woDate" type="date" value="${TODAY}"/></label>
      <label>Project<select id="woProj">${projOpts}</select></label>
      <label>Technician<select id="woTech">${techOpts}</select></label>
      <label class="full">Task<input id="woTask" placeholder="e.g. Field density - 3 tests"/></label>
      <div class="full"><button class="btn primary" onclick="saveWO()">Add to dispatch board</button></div>
    </div>`);
}
function saveWO(){
  const type=$("#woType").value, date=$("#woDate").value||TODAY, proj=$("#woProj").value, tech=$("#woTech").value, task=$("#woTask").value||'(no task)';
  const pre={'Work Order':'WO','Pickup':'PU','Drop Off':'DO','Meeting':'MTG'}[type];
  const id=pre+"-"+Math.floor(Math.random()*9000+1000);
  db.scheduling.push({id:id,type:type,date:date,tech:tech,project:proj,task:task,status:'scheduled'});
  toast(`${esc(type)} <b>${id}</b> added to the dispatch board.`);
  closeDrawer(); go('scheduling');
}

/* ================= PEOPLE ================= */
function viewPeople(){
  const certByStaff={}; db.certifications.forEach(c=>{ (certByStaff[c.staffId]=certByStaff[c.staffId]||[]).push(c); });
  const staffRows=db.staff.map(s=>{
    const certs=certByStaff[s.id]||[];
    const expiring=certs.filter(c=>c.status==='expiring');
    const certCell=certs.length?certs.map(c=>{
      const d=daysUntil(c.expires);
      if(c.status==='expiring') return `<span class="flag amber">${esc(c.body)} &middot; ${d}d</span> <button class="btn gold sm" onclick="renewCert('${c.id}')">Renew</button>`;
      return `<span class="pill green">${esc(c.body)}</span>`;
    }).join(" "):'<span class="muted">&mdash;</span>';
    return `<tr><td><b>${esc(s.name)}</b> ${seed(s)}</td><td>${esc(s.role)}</td>
      <td>${esc((db.departments.find(d=>d.id===s.dept)||{}).name||s.dept)}</td><td>${certCell}</td></tr>`;
  }).join("");
  const groups=db.userGroups.map(g=>`<div class="lrow"><div class="li">&#128101;</div>
    <div class="lb"><div class="t">${esc(g.name)}</div><div class="s">${g.members.map(m=>esc(nameOf(m))).join(', ')}</div></div>
    <div class="la"><span class="pill blue">${esc(g.perms)}</span></div></div>`).join("");
  const timeoff=db.timeOff.map(t=>`<div class="lrow"><div class="li">&#127958;</div>
    <div class="lb"><div class="t">${esc(nameOf(t.staffId))} &middot; ${esc(t.type)} ${seed(t)}</div>
      <div class="s">${fmtDate(t.from)} &rarr; ${fmtDate(t.to)}</div></div>
    <div class="la">${pill(t.status)}${t.status==='requested'?`<button class="btn ok sm" onclick="decideTO('${t.id}','approved')">Approve</button><button class="btn ghost sm" onclick="decideTO('${t.id}','denied')">Deny</button>`:''}</div></div>`).join("");
  const ts=db.timesheets.map(t=>`<div class="lrow"><div class="li">&#9201;</div>
    <div class="lb"><div class="t">${esc(nameOf(t.staffId))} ${seed(t)}</div><div class="s">Week of ${fmtDate(t.weekOf)} &middot; ${t.hours} hrs</div></div>
    <div class="la">${pill(t.status)}${t.status==='submitted'?`<button class="btn ok sm" onclick="approveTS('${t.id}')">Approve</button>`:''}</div></div>`).join("");
  return `
    <div class="viewHead"><div><h1>People</h1><p>${db.staff.length} staff &middot; certifications, groups, time off &amp; timesheets</p></div></div>
    <div class="glass pad" style="margin-bottom:16px"><div class="cardTitle">Staff directory <span class="cnt">${db.staff.length}</span></div>
      <table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Department</th><th>Certifications</th></tr></thead><tbody>${staffRows}</tbody></table></div>
    <div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      ${card('User groups &amp; permissions', groups)}
      ${card('Time off', timeoff)}
    </div>
    <div class="glass pad"><div class="cardTitle">Timesheets</div>${ts}</div>`;
}
function renewCert(id){
  const c=db.certifications.find(x=>x.id===id);
  const y=(parseInt(c.expires.slice(0,4))+2); c.expires=y+c.expires.slice(4); c.status='active'; delete c.action;
  toast(`Renewed <b>${esc(c.body)}</b> cert for ${esc(c.holder)} &mdash; now valid to ${fmtDate(c.expires)}.`); render();
}
function decideTO(id,to){ const t=db.timeOff.find(x=>x.id===id); t.status=to; toast(`Time-off ${to}.`); render(); }
function approveTS(id){ const t=db.timesheets.find(x=>x.id===id); t.status='approved'; toast(`Timesheet approved.`); render(); }

/* ================= DATA METRICS ================= */
function viewMetrics(){
  const m=db.dataMetrics;
  const tiles=[
    tile('Reports this month', m.reportsThisMonth, 'ASTM C39 + field','blue',spark([22,28,25,31,33,35,37])),
    tile('On-time %', m.onTimeReportPct+'%', 'Delivered before due','green'),
    tile('Avg review turnaround', m.avgReviewTurnaroundHrs+' hrs', 'Submit &rarr; PE approve','amber'),
    tile('Breaks this month', m.breaksThisMonth, 'Specimens tested','blue',spark([90,110,120,130,138,140,142])),
    tile('Comply rate', m.complyRatePct+'%', 'Meeting f&prime;c','green'),
    tile('Lab utilization', m.utilizationPct+'%', 'Capacity used','amber'),
  ].join("");
  // donut comply
  const comply=m.complyRatePct, r=52, circ=2*Math.PI*r, off=circ*(1-comply/100);
  const donut=`<div class="donutWrap">
    <svg width="150" height="150" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="rgba(28,40,110,.10)" stroke-width="16"/>
      <circle cx="75" cy="75" r="${r}" fill="none" stroke="#1f8a4c" stroke-width="16" stroke-linecap="round"
        stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 75 75)"/>
      <text x="75" y="72" text-anchor="middle" font-size="30" font-weight="800" fill="#182042">${comply}%</text>
      <text x="75" y="92" text-anchor="middle" font-size="11" fill="#55608c">comply</text>
    </svg>
    <div><div class="stat"><div class="sv" style="color:#1f8a4c">${comply}%</div><div class="sl">Specimens meeting design strength</div></div>
    <div class="stat" style="margin-top:14px"><div class="sv">${100-comply}%</div><div class="sl">Flagged for engineering review</div></div></div></div>`;
  // bar reports vs on-time
  const barData=[['Feb',30,26],['Mar',33,29],['Apr',31,28],['May',35,30],['Jun',36,33],['Jul',37,33]];
  const mx=Math.max(...barData.map(b=>b[1]));
  const bars=barData.map(b=>`<div class="barcol">
    <div class="bv" style="color:#2540c0">${b[1]}</div>
    <div class="bar" style="height:${b[1]/mx*100}%"><div style="position:absolute;bottom:0;left:0;right:0;height:${b[2]/b[1]*100}%;background:linear-gradient(180deg,#2bb069,#1f8a4c);border-radius:0 0 3px 3px;opacity:.95"></div></div>
    <div class="bl">${b[0]}</div></div>`).join("");
  // utilization gauge
  const util=m.utilizationPct;
  return `
    <div class="viewHead"><div><h1>Data Metrics</h1><p>Lab performance analytics &middot; ${fmtDate(TODAY)} ${seed(m)}</p></div></div>
    <div class="tiles" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">${tiles}</div>
    <div class="grid" style="grid-template-columns:.9fr 1.1fr">
      ${card('Comply rate', donut)}
      ${card('Reports vs on-time delivery', `<div class="barchart">${bars}</div>
        <div class="chips" style="margin-top:14px;font-size:11.5px;color:#55608c"><span><span style="color:#2540c0">&#9632;</span> Reports issued</span><span><span style="color:#1f8a4c">&#9632;</span> Delivered on-time</span></div>`)}
    </div>
    <div class="glass pad" style="margin-top:16px"><div class="cardTitle">Lab utilization</div>
      <div style="height:16px;border-radius:10px;background:rgba(28,40,110,.10);overflow:hidden">
        <div style="height:100%;width:${util}%;background:linear-gradient(90deg,#2540c0,#5a70e6);border-radius:10px"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#55608c"><span>${util}% capacity used</span><span>${100-util}% headroom</span></div></div>`;
}

/* ================= DRAWER ================= */
function openDrawer(title,sub,body){
  $("#drawer").innerHTML=`<div class="drawerHead"><div><h2>${title}</h2><div class="sub">${sub}</div></div>
    <button class="x" onclick="closeDrawer()">&times;</button></div><div class="drawerBody">${body}</div>`;
  $("#drawer").classList.add("open"); $("#drawerBack").classList.add("open");
}
function closeDrawer(){ $("#drawer").classList.remove("open"); $("#drawerBack").classList.remove("open"); }

/* ================= COMMAND PALETTE ================= */
function cmdActions(){
  const a=[];
  NAV.forEach(n=>a.push({icon:ICONS[n.id]?'&#9673;':'&#8250;', label:'Go to '+n.label, group:'Navigate', run:()=>go(n.id)}));
  db.reports.filter(r=>r.status==='draft').forEach(r=>a.push({icon:'&#10003;', label:'Approve report '+r.id+' ('+pj(setById(r.setId).projectId).name+')', group:'Break reports', run:()=>{approve(r.setId);}}));
  db.reports.filter(r=>r.status==='approved').forEach(r=>a.push({icon:'&#128232;', label:'Mark '+r.id+' sent', group:'Break reports', run:()=>markSent(r.setId)}));
  db.reports.filter(r=>r.status!=='waiting').forEach(r=>a.push({icon:'&#128203;', label:'Open report '+r.id, group:'Break reports', run:()=>{go('breaks');openReport(r.setId);}}));
  db.certifications.filter(c=>c.status==='expiring').forEach(c=>a.push({icon:'&#127891;', label:'Renew '+c.body+' cert &mdash; '+c.holder, group:'People', run:()=>{go('people');renewCert(c.id);}}));
  db.fieldReports.filter(f=>f.status!=='approved').forEach(f=>a.push({icon:'&#128221;', label:'Advance field report '+f.id, group:'Field', run:()=>{go('field');openField(f.id);}}));
  a.push({icon:'&#128296;', label:'Create work order', group:'Scheduling', run:()=>{go('scheduling');createWO();}});
  a.push({icon:'&#8635;', label:'Sync now from Omnant', group:'System', run:()=>syncNow()});
  a.push({icon:'&#11015;', label:'Export dataset (JSON)', group:'System', run:()=>exportJSON()});
  db.clients.forEach(c=>a.push({icon:'&#127970;', label:c.name, group:'Clients', run:()=>{go('projects');openClient(c.id);}}));
  return a;
}
let cmdSel=0, cmdData=[];
function openCmd(){ $("#cmdBack").classList.add("open"); $("#cmdInput").value=""; cmdSel=0; filterCmd(); setTimeout(()=>$("#cmdInput").focus(),30); }
function closeCmd(){ $("#cmdBack").classList.remove("open"); }
function filterCmd(){
  const q=($("#cmdInput").value||"").toLowerCase();
  cmdData=cmdActions().filter(a=>a.label.toLowerCase().replace(/&[a-z]+;/g,'').includes(q));
  cmdSel=Math.min(cmdSel,Math.max(0,cmdData.length-1));
  $("#cmdList").innerHTML=cmdData.map((a,i)=>`<div class="cmdRow ${i===cmdSel?'sel':''}" onmouseover="cmdSel=${i};hlCmd()" onclick="runCmd(${i})">
    <span class="ci">${a.icon}</span><span>${a.label}</span><span class="cg">${a.group}</span></div>`).join("")||`<div class="empty">No matches.</div>`;
}
function hlCmd(){ $$("#cmdList .cmdRow").forEach((el,i)=>el.classList.toggle('sel',i===cmdSel)); }
function runCmd(i){ const a=cmdData[i]; if(a){ closeCmd(); a.run(); } }
function cmdKey(e){
  if(e.key==='ArrowDown'){e.preventDefault();cmdSel=Math.min(cmdSel+1,cmdData.length-1);hlCmd();scrollSel();}
  else if(e.key==='ArrowUp'){e.preventDefault();cmdSel=Math.max(cmdSel-1,0);hlCmd();scrollSel();}
  else if(e.key==='Enter'){e.preventDefault();runCmd(cmdSel);}
  else if(e.key==='Escape'){closeCmd();}
}
function scrollSel(){ const el=$$("#cmdList .cmdRow")[cmdSel]; if(el)el.scrollIntoView({block:'nearest'}); }

/* ================= EXPORT / IMPORT ================= */
function exportJSON(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="segarra-data.json"; a.click(); URL.revokeObjectURL(a.href);
  toast("Exported working dataset to <b>segarra-data.json</b>.");
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const obj=JSON.parse(rd.result); db=obj; window.DATA=obj; toast("Imported dataset &mdash; re-rendering."); render(); }
    catch(err){ toast("Import failed: invalid JSON."); } };
  rd.readAsText(f); ev.target.value="";
}

/* ================= GLOBAL KEYS ================= */
document.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); $("#cmdBack").classList.contains('open')?closeCmd():openCmd(); }
  else if(e.key==='Escape'){ closeModal(); closeDrawer(); closeCmd(); }
});
$("#cmdBack").addEventListener('click', e=>{ if(e.target.id==='cmdBack') closeCmd(); });

/* ================= INIT ================= */
(async function boot(){
  try { DATA = await inflateData(); }
  catch(e){ console.error("LabOS: data inflate failed", e); DATA = {}; }
  db = DATA; window.DATA = DATA; render();
})();

</script>
